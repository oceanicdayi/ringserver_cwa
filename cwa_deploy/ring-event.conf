# Minimal ringserver config for earthquake event JSON streaming.
# Usage (from this directory):
#   mkdir -p ring
#   ../ringserver ring-event.conf

ServerID "CWA Event JSON"

RingDirectory ring
RingSize 64M

# Event JSON packets are often larger than the default 512-byte miniSEED size.
MaxPacketSize 65536

# DataLink for publish/subscribe; HTTP for /streams and WebSocket /datalink
DataLinkPort 16000
ListenPort 18000 DataLink HTTP

# Allow local writers by default (WriteIP grants write to localhost if unset).
# WriteIP 127.0.0.1
# WriteIP 10.0.0.0/8
